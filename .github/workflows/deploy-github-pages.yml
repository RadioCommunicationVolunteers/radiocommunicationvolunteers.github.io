name: Deployment to GitHub Pages
permissions: write-all
on:
  workflow_dispatch:
  push:
    branches:
      - main # <-- specify the branch you want to deploy from

env:
  REPO_NAME: ${{ github.event.repository.name }}
  REPO_OWNER: ${{ github.repository_owner }}

jobs:      
  # Build job
  build:
    # Specify runner +  build & upload the static files as an artifact
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Checkout ${REPO_NAME}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod
          
      - name: Build static files
        id: build
        run: |
          # <Not provided for brevity>
          # At a minimum this step should build the static files of your site
          # <Not provided for brevity>
          
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true
          
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run NPM Clean Install
        run: npm ci
        
      - name: Run Hugo Build
        run: >-
          hugo --baseURL https://${REPO_OWNER}.github.io
          --minify

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # - name: Upload static files as artifact
      #   id: deployment
      #   uses: actions/upload-pages-artifact@v3 # or specific "vX.X.X" version tag for this action
      #   with:
      #     path: build_outputs_folder/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
        # if: ${{ github.ref == 'refs/heads/gh-pages' }} # <-- specify same branch as above here
        # with:
        #   github_token: ${{ secrets.GITHUB_TOKEN }}

